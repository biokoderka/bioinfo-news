<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioInfoNews by @biokoderka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#170b2d;--bg2:#241044;--card:#fff;--text:#21182f;--muted:#70647f;--primary:#7c3aed;--primary2:#a855f7;--soft:#f4e8ff;--soft2:#ead5ff;--border:#e8d5ff;--good:#166534;--warn:#92400e;--bad:#991b1b}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;background:linear-gradient(135deg,var(--bg),#3b0764 42%,#6d28d9);color:var(--text);min-height:100vh}
a{color:var(--primary);font-weight:700;text-decoration:none}
a:hover{text-decoration:underline}
.wrap{max-width:1160px;margin:0 auto;padding:28px 18px}
.hero{color:white;padding:34px 0 18px}
.nav{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:22px}
.nav a{color:white;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);padding:10px 14px;border-radius:999px;font-weight:700;font-size:14px}
.nav a.active{background:white;color:#4c1d95}
.hero h1{font-size:clamp(32px,6vw,64px);line-height:.96;margin:0 0 14px}
.hero p{max-width:900px;color:#f3e8ff;font-size:18px;line-height:1.55}

/* SECTION BLOCK */
.section-block{margin-bottom:36px}
.section-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.section-title{font-size:22px;font-weight:900;color:white;margin:0}
.section-count{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:white;font-size:13px;font-weight:800;padding:4px 12px;border-radius:999px}
.see-all{margin-left:auto;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);color:white;font-size:13px;font-weight:800;padding:8px 16px;border-radius:999px;text-decoration:none;white-space:nowrap;transition:.15s}
.see-all:hover{background:rgba(255,255,255,.25);text-decoration:none}

/* CARDS GRID */
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.card{background:rgba(255,255,255,.96);border:1px solid var(--border);box-shadow:0 8px 32px rgba(24,8,48,.18);border-radius:20px;padding:18px;display:flex;flex-direction:column;gap:8px}
.type-pill{border-radius:999px;padding:4px 12px;font-size:12px;font-weight:800;display:inline-flex;align-items:center;gap:4px;align-self:flex-start}
.type-pill.project{background:#dcfce7;border:1px solid #bbf7d0;color:#166534}
.type-pill.course-free{background:#e0f2fe;border:1px solid #bae6fd;color:#0369a1}
.type-pill.course-dated{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.type-pill.meetup{background:#fce7f3;border:1px solid #fbcfe8;color:#9d174d}
.type-pill.other{background:var(--soft);border:1px solid var(--border);color:#4c1d95}
.card h3{margin:0;font-size:15px;font-weight:800;color:var(--text);line-height:1.35}
.card .org{font-size:12px;color:var(--muted);margin:0}
.card .desc{font-size:13px;color:#3d3050;line-height:1.55;flex:1;margin:0;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.meta{display:flex;gap:6px;flex-wrap:wrap}
.pill{background:var(--soft);border:1px solid var(--border);border-radius:999px;padding:4px 10px;font-size:12px;color:#4c1d95;display:inline-flex;align-items:center;gap:3px}
.pill.date{background:#fffbeb;border-color:#fde68a;color:#92400e}
.pill.deadline{background:#fee2e2;border-color:#fecaca;color:#991b1b}
.pill.free{background:#dcfce7;border-color:#bbf7d0;color:#166534}
.pill.neutral{background:#f3f4f6;border-color:#e5e7eb;color:#4b5563}
.card-link{display:inline-block;margin-top:4px;background:linear-gradient(135deg,var(--primary),var(--primary2));color:white;padding:7px 14px;border-radius:999px;font-size:12px;font-weight:900;text-decoration:none;align-self:flex-start}
.card-link:hover{opacity:.85;text-decoration:none}

.empty-section{background:rgba(255,255,255,.07);border:1px dashed rgba(255,255,255,.2);border-radius:20px;padding:24px;text-align:center;color:rgba(255,255,255,.5);font-size:14px}

.divider{border:none;border-top:1px solid rgba(255,255,255,.12);margin:8px 0 36px}

.footer{color:#f3e8ff;margin:32px 0;font-size:14px}
.footer a{color:#f3e8ff}

@media(max-width:900px){.cards-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:580px){.cards-grid{grid-template-columns:1fr}.section-header{gap:8px}.see-all{margin-left:0;width:100%}}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <nav class="nav">
      <a class="active" href="index.html">🧬 BioInfoNews</a>
      <a href="https://biokoderka.github.io/bioinfo-jobs/">Oferty pracy</a>
      <a href="https://biokoderka.github.io/bioinfo-uni/">Uczelnie</a>
      <a href="submit.html">✦ Zgłoś wpis</a>
    </nav>
    <h1>BioInfoNews</h1>
    <p>Projekty, kursy, meetupy i inicjatywy bioinformatyczne w jednym miejscu.<br>
    Prowadzone przez <a href="https://instagram.com/biokoderka" style="color:white">@biokoderka</a>.</p>
  </header>

  <div id="sections-container"></div>

  <footer class="footer">
    🧬 <strong>BioInfoNews</strong> by <a href="https://instagram.com/biokoderka">@biokoderka</a> &nbsp;·&nbsp;
    <a href="submit.html">Zgłoś wpis</a> &nbsp;·&nbsp;
    <a href="https://biokoderka.github.io/bioinfo-jobs/">BioInfoJobs</a> &nbsp;·&nbsp;
    <a href="https://biokoderka.github.io/bioinfo-uni/">BioInfoUni</a>
  </footer>
</div>

<script>
const SECTIONS = [
  { type: 'meetup',      emoji: '🤝', label: 'Meetupy i wydarzenia',     page: 'meetups.html' },
  { type: 'course-dated',emoji: '🗓', label: 'Kursy z terminem',          page: 'courses-dated.html' },
  { type: 'course-free', emoji: '📚', label: 'Kursy stałe i zasoby',      page: 'courses-free.html' },
  { type: 'project',     emoji: '🌿', label: 'Projekty do współpracy',    page: 'projects.html' },
  { type: 'other',       emoji: '✦',  label: 'Inne inicjatywy',           page: 'other.html' },
];

const TYPE_META = {
  'project':      { label: '🌿 Projekt',        cls: 'project' },
  'course-free':  { label: '📚 Kurs stały',      cls: 'course-free' },
  'course-dated': { label: '🗓 Kurs z terminem', cls: 'course-dated' },
  'meetup':       { label: '🤝 Meetup',          cls: 'meetup' },
  'other':        { label: '✦ Inne',             cls: 'other' },
};

function isArchived(e) {
  if (e.archived) return true;
  if (e.date_end) return new Date(e.date_end) < new Date();
  return false;
}

function fmtDate(str) {
  return new Date(str).toLocaleDateString('pl-PL', {day:'numeric', month:'short', year:'numeric'});
}

function renderCard(e) {
  const tm = TYPE_META[e.type] || TYPE_META['other'];
  let pills = '';
  if (e.free)       pills += `<span class="pill free">✓ bezpłatne</span>`;
  if (e.date_start) pills += `<span class="pill date">📅 ${fmtDate(e.date_start)}</span>`;
  if (e.deadline)   pills += `<span class="pill deadline">⏰ do ${fmtDate(e.deadline)}</span>`;
  if (e.location)   pills += `<span class="pill neutral">📍 ${e.location}</span>`;
  return `<article class="card">
    <span class="type-pill ${tm.cls}">${tm.label}</span>
    <h3>${e.title}</h3>
    ${e.org ? `<p class="org">${e.org}</p>` : ''}
    <p class="desc">${e.description}</p>
    ${pills ? `<div class="meta">${pills}</div>` : ''}
    ${e.url ? `<a class="card-link" href="${e.url}" target="_blank" rel="noopener">Więcej info →</a>` : ''}
  </article>`;
}

function sortByDate(entries) {
  return entries.sort((a, b) => {
    const da = a.date_start ? new Date(a.date_start) : new Date(a.added || '2099-01-01');
    const db = b.date_start ? new Date(b.date_start) : new Date(b.added || '2099-01-01');
    return da - db;
  });
}

async function init() {
  const r = await fetch('news.json?v=' + Date.now());
  const data = await r.json();
  const active = data.entries.filter(e => !isArchived(e));

  const container = document.getElementById('sections-container');
  let html = '';

  SECTIONS.forEach((sec, i) => {
    const all = sortByDate(active.filter(e => e.type === sec.type));
    const top3 = all.slice(0, 3);
    const count = all.length;

    html += `<div class="section-block">
      <div class="section-header">
        <h2 class="section-title">${sec.emoji} ${sec.label}</h2>
        <span class="section-count">${count} aktywne</span>
        ${count > 3 ? `<a class="see-all" href="${sec.page}">Zobacz wszystkie (${count}) →</a>` : count > 0 ? `<a class="see-all" href="${sec.page}">Zobacz wszystkie →</a>` : ''}
      </div>`;

    if (top3.length === 0) {
      html += `<div class="empty-section">Brak aktywnych wpisów — <a href="submit.html" style="color:rgba(255,255,255,.7)">zgłoś pierwszy</a></div>`;
    } else {
      html += `<div class="cards-grid">` + top3.map(renderCard).join('') + `</div>`;
    }

    html += `</div>`;
    if (i < SECTIONS.length - 1) html += `<hr class="divider">`;
  });

  container.innerHTML = html;
}

init().catch(() => {
  document.getElementById('sections-container').innerHTML =
    '<div style="color:rgba(255,255,255,.6);padding:40px 0;text-align:center">Nie udało się załadować danych.</div>';
});
</script>
</body>
</html>
