<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Kursy stałe i zasoby — BioInfoNews</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#170b2d;--bg2:#241044;--card:#fff;--text:#21182f;--muted:#70647f;--primary:#7c3aed;--primary2:#a855f7;--soft:#f4e8ff;--soft2:#ead5ff;--border:#e8d5ff;--good:#166534;--warn:#92400e;--bad:#991b1b}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;background:linear-gradient(135deg,var(--bg),#3b0764 42%,#6d28d9);color:var(--text);min-height:100vh}
a{color:var(--primary);font-weight:700;text-decoration:none}
a:hover{text-decoration:underline}
.wrap{max-width:1160px;margin:0 auto;padding:28px 18px}
.hero{color:white;padding:34px 0 18px}
.nav{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:22px}
.nav a{color:white;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);padding:10px 14px;border-radius:999px;font-weight:700;font-size:14px}
.nav a.active{background:white;color:#4c1d95}
.hero h1{font-size:clamp(28px,5vw,52px);line-height:1;margin:0 0 10px}
.hero p{max-width:900px;color:#f3e8ff;font-size:16px;line-height:1.55}

.panel{background:rgba(255,255,255,.96);border:1px solid var(--border);box-shadow:0 24px 80px rgba(24,8,48,.22);border-radius:26px;padding:18px;margin:12px 0 18px}
.filters{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
input,select{width:100%;border:1px solid var(--border);border-radius:16px;padding:12px 14px;background:white;color:var(--text);font:inherit;font-size:14px}

.stats-bar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
.stats-bar span{color:#f3e8ff;font-size:14px}
.stats-bar strong{color:white}
.archive-toggle{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);color:white;padding:8px 14px;border-radius:999px;font:inherit;font-size:13px;font-weight:800;cursor:pointer;transition:.15s;margin-left:auto}
.archive-toggle:hover{background:rgba(255,255,255,.22)}
.archive-toggle.on{background:white;color:#4c1d95}

.cards{display:grid;gap:14px}
.card{background:rgba(255,255,255,.96);border:1px solid var(--border);box-shadow:0 8px 32px rgba(24,8,48,.15);border-radius:20px;padding:20px;position:relative}
.card.archived{opacity:.55}
.archived-badge{position:absolute;top:16px;right:16px;background:#f3f4f6;border:1px solid #e5e7eb;color:#6b7280;font-size:11px;font-weight:800;padding:3px 10px;border-radius:999px}
.card-header{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.type-pill{border-radius:999px;padding:5px 12px;font-size:13px;font-weight:800;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.type-pill.project{background:#dcfce7;border:1px solid #bbf7d0;color:#166534}
.type-pill.course-free{background:#e0f2fe;border:1px solid #bae6fd;color:#0369a1}
.type-pill.course-dated{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.type-pill.meetup{background:#fce7f3;border:1px solid #fbcfe8;color:#9d174d}
.type-pill.other{background:var(--soft);border:1px solid var(--border);color:#4c1d95}
.card h3{margin:0;font-size:17px;font-weight:800;color:var(--text);flex:1}
.card .org{font-size:13px;color:var(--muted);margin-bottom:8px}
.card .desc{font-size:14px;color:var(--text);line-height:1.6;margin-bottom:10px}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0}
.pill{background:var(--soft);border:1px solid var(--border);border-radius:999px;padding:5px 12px;font-size:13px;color:#4c1d95;display:inline-flex;align-items:center;gap:4px}
.pill.date{background:#fffbeb;border-color:#fde68a;color:#92400e}
.pill.deadline{background:#fee2e2;border-color:#fecaca;color:#991b1b}
.pill.free{background:#dcfce7;border-color:#bbf7d0;color:#166534}
.pill.neutral{background:#f3f4f6;border-color:#e5e7eb;color:#4b5563}
.card-link{display:inline-block;margin-top:8px;background:linear-gradient(135deg,var(--primary),var(--primary2));color:white;padding:8px 16px;border-radius:999px;font-size:13px;font-weight:900;text-decoration:none}
.card-link:hover{opacity:.85;text-decoration:none}
.empty{padding:40px;text-align:center;color:rgba(255,255,255,.6);font-size:15px}
.footer{color:#f3e8ff;margin:32px 0;font-size:14px}
.footer a{color:#f3e8ff}
@media(max-width:600px){.filters{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <nav class="nav">
      <a href="index.html">← Strona główna</a>
      <a href="https://biokoderka.github.io/bioinfo-jobs/">Oferty pracy</a>
      <a href="https://biokoderka.github.io/bioinfo-uni/">Uczelnie</a>
      <a href="submit.html" class="active">✦ Zgłoś wpis</a>
    </nav>
    <h1>📚 Kursy stałe i zasoby</h1>
    <p>Wszystkie wpisy w tej kategorii. Prowadzone przez <a href="https://instagram.com/biokoderka" style="color:white">@biokoderka</a>.</p>
  </header>

  <section class="panel">
    <div class="filters">
      <input type="text" id="searchInput" placeholder="Szukaj…">
      <select id="langFilter">
        <option value="">Język: dowolny</option>
        <option value="PL">🇵🇱 Polski</option>
        <option value="EN">🇬🇧 Angielski</option>
      </select>
      <select id="freeFilter">
        <option value="">Płatność: dowolna</option>
        <option value="free">Bezpłatne</option>
      </select>
    </div>
  </section>

  <div class="stats-bar">
    <span id="statsLine">Ładowanie…</span>
    <button class="archive-toggle" id="archiveToggle">📦 Archiwum</button>
  </div>

  <section class="cards" id="cards">
    <div class="empty">Ładowanie…</div>
  </section>

  <footer class="footer">
    🧬 <strong>BioInfoNews</strong> by <a href="https://instagram.com/biokoderka">@biokoderka</a> &nbsp;·&nbsp;
    <a href="index.html">Strona główna</a> &nbsp;·&nbsp;
    <a href="submit.html">Zgłoś wpis</a>
  </footer>
</div>

<script>
const TYPE_KEY = 'course-free';
const TYPE_META = {
  'project':      { label: '🌿 Projekt',        cls: 'project' },
  'course-free':  { label: '📚 Kurs stały',      cls: 'course-free' },
  'course-dated': { label: '🗓 Kurs z terminem', cls: 'course-dated' },
  'meetup':       { label: '🤝 Meetup',          cls: 'meetup' },
  'other':        { label: '✦ Inne',             cls: 'other' },
};

let allEntries = [];
let showArchive = false;

function isArchived(e) {
  if (e.archived) return true;
  if (e.date_end) return new Date(e.date_end) < new Date();
  return false;
}
function fmtDate(s) {
  return new Date(s).toLocaleDateString('pl-PL',{day:'numeric',month:'long',year:'numeric'});
}
function render() {
  const q    = document.getElementById('searchInput').value.toLowerCase();
  const lang = document.getElementById('langFilter').value;
  const free = document.getElementById('freeFilter').value;

  let entries = allEntries.filter(e => {
    if (showArchive !== isArchived(e)) return false;
    if (q && !JSON.stringify(e).toLowerCase().includes(q)) return false;
    if (lang && !(e.lang||'').includes(lang)) return false;
    if (free === 'free' && !e.free) return false;
    return true;
  });

  entries.sort((a,b) => {
    const da = a.date_start ? new Date(a.date_start) : new Date(a.added||'2099-01-01');
    const db = b.date_start ? new Date(b.date_start) : new Date(b.added||'2099-01-01');
    return showArchive ? db - da : da - db;
  });

  const activeCount  = allEntries.filter(e => !isArchived(e)).length;
  const archiveCount = allEntries.filter(e =>  isArchived(e)).length;
  document.getElementById('statsLine').innerHTML =
    `<strong>${activeCount}</strong> aktywne · <strong>${archiveCount}</strong> w archiwum`;

  if (!entries.length) {
    document.getElementById('cards').innerHTML =
      `<div class="empty">Brak wpisów.<br><a href="submit.html" style="color:rgba(255,255,255,.8);text-decoration:underline">Zgłoś pierwszy →</a></div>`;
    return;
  }

  document.getElementById('cards').innerHTML = entries.map(e => {
    const archived = isArchived(e);
    const tm = TYPE_META[e.type] || TYPE_META['other'];
    let pills = '';
    if (e.free)       pills += `<span class="pill free">✓ bezpłatne</span>`;
    if (e.date_start) pills += `<span class="pill date">📅 ${fmtDate(e.date_start)}</span>`;
    if (e.deadline)   pills += `<span class="pill deadline">⏰ zgłoszenia do ${fmtDate(e.deadline)}</span>`;
    if (e.location)   pills += `<span class="pill neutral">📍 ${e.location}</span>`;
    if (e.lang)       pills += `<span class="pill neutral">${e.lang}</span>`;
    return `<article class="card${archived?' archived':''}">
      ${archived?'<span class="archived-badge">ARCHIWUM</span>':''}
      <div class="card-header">
        <span class="type-pill ${tm.cls}">${tm.label}</span>
        <h3>${e.title}</h3>
      </div>
      ${e.org?`<div class="org">${e.org}</div>`:''}
      <div class="desc">${e.description}</div>
      ${pills?`<div class="meta">${pills}</div>`:''}
      ${e.url?`<a class="card-link" href="${e.url}" target="_blank" rel="noopener">Więcej info →</a>`:''}
    </article>`;
  }).join('');
}

async function init() {
  const r = await fetch('news.json?v=' + Date.now());
  const data = await r.json();
  allEntries = (data.entries || []).filter(e => e.type === TYPE_KEY);
  render();
}

document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('langFilter').addEventListener('change', render);
document.getElementById('freeFilter').addEventListener('change', render);
document.getElementById('archiveToggle').addEventListener('click', function() {
  showArchive = !showArchive;
  this.classList.toggle('on', showArchive);
  this.textContent = showArchive ? '◀ Aktualności' : '📦 Archiwum';
  render();
});

init();
</script>
</body>
</html>
